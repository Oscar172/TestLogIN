<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En frĂ¥ga till dig...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #ffebee;
            overflow: hidden;
            margin: 0;
        }
        h1 { color: #d32f2f; text-align: center; padding: 0 20px; }
        
        .buttons { 
            margin-top: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 20px; 
            width: 100%;
            height: 50px;
        }

        button {
            padding: 15px 30px;
            min-width: 120px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px; /* GĂ¶r knappen snyggt rundad */
            font-weight: bold;
            transition: transform 0.1s;
        }

        #yesBtn { 
            background-color: #4caf50; 
            color: white; 
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        #noBtn { 
            background-color: #f44336; 
            color: white; 
            z-index: 1000;
        }

        .hidden { display: none; }

        .gif-container {
            margin-top: 20px;
        }

        img {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="question">
        <h1>Vill du typ... idk... gĂ¥ pĂ¥ dejt pĂ¥ lĂ¶rdag?+?++?+?đŸ‘‰đŸ‘ˆđŸ¥¹</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">ehhh... ja?11+?!+!</button>
            <button id="noBtn">Absolut inte lol</button>
        </div>
    </div>

    <div id="success" class="hidden" style="text-align: center;">
        <h1>SĂ…Ă…Ă…Ă…JA we win thoooose. Bra dĂ¥ Ă¤r det spikat.</h1>
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZmh3cHhoaW9vZzRlbTRmb3Y5a3Fkcjl3YjIxbWdvZGVheDE3bWt0MCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/0A8C2gShpze1Znvfwh/giphy.gif">
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const questionDiv = document.getElementById('question');
        const successDiv = document.getElementById('success');

        function moveButton() {
            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
            }
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);
        noBtn.addEventListener('click', moveButton);

        function celebrate() {
            questionDiv.classList.add('hidden');
            successDiv.classList.remove('hidden');
            document.body.style.backgroundColor = "#ffcdd2";
        }
    </script>
</body>
</html>
