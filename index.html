<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Logga in</h2>

    <input type="text" id="username" placeholder="Användarnamn">
    <br><br>
    <input type="password" id="password" placeholder="Lösenord">
    <br><br>

    <button onclick="login()">Logga in</button>

    <p id="result"></p>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        document.getElementById("result").innerText = "Inloggad!";
    } else {
        document.getElementById("result").innerText = "Fel uppgifter";
    }
}
</script>

</body>
</html>
